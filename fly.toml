# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'freshdesk-mcp'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.health]
    type = 'http'
    port = 8000
    path = '/mcp'
    method = 'GET'
    interval = '30s'
    timeout = '5s'
